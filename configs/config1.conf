server {
    listen 8080;
    listen 8081;

    error_page 404 /errors/404.html;
    error_page 500 /errors/500.html;
    client_max_body_size 10000000;

    location / {
        methods GET POST;
        root ./frontend;
        index index.html;
        autoindex off;
    }

    location /upload {
        methods POST;
        root ./frontend;
        upload_store ./frontend/uploads;
    }

    location /files {
        methods GET DELETE;
        root ./frontend;
        autoindex on;
    }

    location /redirect {
        return 301 https://google.com;
    }

    location /cgi-bin {
        methods GET POST;
        root ./frontend/cgi-bin;
        cgi_handler .py /usr/bin/python3;
        cgi_handler .php /usr/bin/php-cgi;
    }
}